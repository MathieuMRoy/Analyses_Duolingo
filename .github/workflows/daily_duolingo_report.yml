name: Daily Duolingo Report

on:
  workflow_dispatch:

concurrency:
  group: duolingo-daily-report
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      PYTHONUNBUFFERED: "1"
      DUOLINGO_JWT: ${{ secrets.DUOLINGO_JWT }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          required=(DUOLINGO_JWT GDRIVE_SERVICE_ACCOUNT_JSON GDRIVE_FOLDER_ID)
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Le secret ${name} est manquant."
              exit 1
            fi
          done

      - name: Restore historical files from Google Drive
        run: python scripts_utilitaires/google_drive_sync.py pull

      - name: Run daily analysis
        run: python main.py

      - name: Rebuild historical workbook
        env:
          PYTHONPATH: .
        run: python scripts_utilitaires/build_historique.py

      - name: Push updated files to Google Drive
        run: python scripts_utilitaires/google_drive_sync.py push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duolingo-report-${{ github.run_id }}
          path: |
            rapports_donnees/rapport_historique.xlsx
            daily_streaks_log.csv





